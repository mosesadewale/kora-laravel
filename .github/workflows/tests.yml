name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        laravel: ['10', '11', '12']
        include:
          - laravel: '10'
            testbench: '^8.0'
          - laravel: '11'
            testbench: '^9.0'
          - laravel: '12'
            testbench: '^10.0'

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-L${{ matrix.laravel }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-L${{ matrix.laravel }}-

      - name: Install dependencies
        run: |
          composer require "orchestra/testbench:${{ matrix.testbench }}" --no-update --dev
          composer update --prefer-dist --no-progress

      - name: PHPStan
        run: vendor/bin/phpstan analyse

      - name: PHPUnit
        run: vendor/bin/phpunit
